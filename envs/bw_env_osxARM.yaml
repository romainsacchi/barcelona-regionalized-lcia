# in your terminal, run conda: conda env create -f bw_env_osxARM.yaml

name: bw
channels:
  - conda-forge
  - cmutel
  - lca
  - defaults
dependencies:
  - python
  - bw2calc
  - bw2data
  - bw2io
  - bw2analyzer
  - bw2parameters
  - bw_processing
  - stats_arrays
  - scipy
  - scikit-umfpack
  - jupyterlab
  - numpy==1.24.4
  - pandas
  - openpyxl
  - matplotlib
  - plotly
  - networkx
  - seaborn
  - prettytable
  - edges>=1.2.8
  - constructive_geometries
  - country_converter
  # edges currently runs a post-link ``pip install clipspy`` step. Keep pip
  # below 26 to avoid stricter metadata handling during that hook.
  - pip<26
  # scikit-umfpack still imports through the legacy ``scikits`` namespace,
  # which expects ``pkg_resources`` to be present. Newer setuptools releases
  # can remove that module and trigger the bw2calc ARM sparse-solver warning.
  - setuptools<81
  - pip:
      - multifunctional
      - bw_simapro_csv
      - git+https://github.com/romainsacchi/d3blocks.git
      - polyviz
      - activity-browser
