# in your terminal, run conda: conda env create -f bw_env_osxARM.yaml

name: bw
channels:
  - conda-forge
  - cmutel
  - defaults
dependencies:
  - python=3.11
  - bw2calc
  - bw2data
  - bw2io
  - bw2analyzer
  - scipy
  - scikit-umfpack
  - jupyterlab
  - matplotlib
  - seaborn
  - edges
  - pip
  - setuptools<81
  - numpy==1.24.4
  - pip:
      - multifunctional
      - bw_simapro_csv
      - git+https://github.com/romainsacchi/d3blocks.git
      - polyviz
