# in your terminal, run conda: conda env create -f bw_env_win64.yaml

name: bw
channels:
  - conda-forge
  - cmutel
  - lca
  - defaults
dependencies:
  - python
  - bw2calc
  - bw2data
  - bw2io
  - bw2analyzer
  - bw2parameters
  - bw_processing
  - stats_arrays
  - pypardiso
  - scipy
  - jupyterlab
  - numpy
  - pandas
  - openpyxl
  - matplotlib
  - plotly
  - networkx
  - seaborn
  - prettytable
  - edges>=1.2.8
  - constructive_geometries
  - country_converter
  - pip
  - setuptools<81

  - pip:
      - multifunctional
      - bw_simapro_csv
      - git+https://github.com/romainsacchi/d3blocks.git
      - polyviz
      - activity-browser
